<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Segunda Pagina</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        background: linear-gradient(135deg, #0b1020, #132347);
        color: #e5e7eb;
        padding: 16px;
      }

      .card {
        width: min(560px, 100%);
        background: rgba(17, 24, 39, 0.7);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 12px;
        padding: 24px;
        box-shadow: 0 14px 40px rgba(0, 0, 0, 0.4);
      }

      h1 {
        margin-top: 0;
      }

      p {
        color: #c7cddd;
      }

      .btn {
        display: inline-block;
        margin-top: 8px;
        border: none;
        border-radius: 999px;
        padding: 10px 18px;
        font-weight: 600;
        text-decoration: none;
        background: linear-gradient(90deg, #60a5fa, #22d3ee);
        color: #081122;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Segunda Pagina</h1>
      <p>Voce chegou na segunda pagina do projeto.</p>
      <a class="btn" href="index.html">Voltar para a Pagina Principal</a>
    </main>
  </body>
</html>
