<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Segunda Pagina</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        background: linear-gradient(135deg, #0b1020, #132347);
        color: #e5e7eb;
        padding: 24px 16px;
      }

      .container {
        max-width: 820px;
        margin: 0 auto;
      }

      .topbar {
        display: flex;
        justify-content: flex-end;
        margin-bottom: 12px;
      }

      .menu-dropdown summary {
        list-style: none;
        cursor: pointer;
        user-select: none;
        display: inline-block;
        border-radius: 999px;
        padding: 9px 14px;
        font-weight: 600;
        background: rgba(17, 24, 39, 0.8);
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: #e5e7eb;
      }

      .menu-dropdown summary::-webkit-details-marker {
        display: none;
      }

      .menu-content {
        margin-top: 8px;
        min-width: 190px;
        padding: 10px;
        border-radius: 12px;
        background: rgba(17, 24, 39, 0.95);
        border: 1px solid rgba(255, 255, 255, 0.18);
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.35);
      }

      .menu-content a {
        display: block;
        text-decoration: none;
        color: #c7cddd;
        padding: 8px 10px;
        border-radius: 8px;
      }

      .menu-content a:hover {
        background: rgba(147, 197, 253, 0.15);
        color: #f3f4f6;
      }

      .card {
        width: min(560px, 100%);
        background: rgba(17, 24, 39, 0.7);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 12px;
        padding: 24px;
        box-shadow: 0 14px 40px rgba(0, 0, 0, 0.4);
      }

      h1 {
        margin-top: 0;
      }

      p {
        color: #c7cddd;
      }

      .btn {
        display: inline-block;
        margin-top: 8px;
        border: none;
        border-radius: 999px;
        padding: 10px 18px;
        font-weight: 600;
        text-decoration: none;
        background: linear-gradient(90deg, #60a5fa, #22d3ee);
        color: #081122;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <nav class="topbar" aria-label="Menu principal">
        <details class="menu-dropdown">
          <summary>Menu</summary>
          <div class="menu-content">
            <a href="#sobre">Sobre</a>
            <a href="#contato">Contato</a>
            <a href="#servicos">Serviços</a>
            <a href="index.html">Página Principal</a>
          </div>
        </details>
      </nav>

      <main class="card">
        <h1>Segunda Pagina</h1>
        <p>Voce chegou na segunda pagina do projeto.</p>
        <p id="sobre">Sobre: esta pagina complementa o conteudo principal do site.</p>
        <p id="servicos">Serviços: navegacao entre paginas e informacoes extras.</p>
        <p id="contato">Contato: nuvem@escola.com</p>
        <a class="btn" href="index.html">Voltar para a Pagina Principal</a>
      </main>
    </div>
  </body>
</html>
